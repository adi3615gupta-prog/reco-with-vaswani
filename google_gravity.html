<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Gravity — Next Gen</title>
  
  <!-- Sleek Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Physics Engine Matter.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  
  <!-- Premium Lucide Icons via CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* NEXT-GEN DESIGN SYSTEM */
    :root {
      --bg-color: #05070f;
      --font-family: 'Inter', sans-serif;
      --heading-font: 'Outfit', sans-serif;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --neon-cyan: #00f0ff;
      --neon-purple: #bd00ff;
      --neon-blue: #3b82f6;
      --neon-red: #ef4444;
      --neon-yellow: #f59e0b;
      --neon-green: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at 50% 50%, #0c122c 0%, #03050a 100%),
        linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      font-family: var(--font-family);
      color: #e2e8f0;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Pulsing Spots */
    .spotlight {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
      opacity: 0.12;
      z-index: 0;
      mix-blend-mode: screen;
      animation: pulse-ambient 8s infinite alternate ease-in-out;
    }
    .spot-1 {
      top: -10%;
      left: 10%;
      background: var(--neon-cyan);
    }
    .spot-2 {
      bottom: -10%;
      right: 10%;
      background: var(--neon-purple);
      animation-delay: 4s;
    }

    @keyframes pulse-ambient {
      0% { transform: scale(1); opacity: 0.1; }
      100% { transform: scale(1.2); opacity: 0.16; }
    }

    /* PHYSICS CANVAS OVERLAY */
    #physics-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: auto; /* Handles Matter.js Mouse Constraint dragging */
    }

    /* GLASSMORPHIC INTERACTIVE ELEMENTS CONTAINER */
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none; /* Let clicks pass to the canvas underneath */
    }

    /* STYLES FOR THE FALLING ELEMENT NODES */
    .grav-item {
      position: absolute;
      pointer-events: none; /* Physics canvas will handle the drag interactions */
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
      will-change: transform, left, top;
    }

    /* 1. Google Futuristic Logo */
    #google-logo {
      font-family: var(--heading-font);
      font-weight: 900;
      font-size: 5rem;
      letter-spacing: -0.03em;
      white-space: nowrap;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
    }
    .g-blue { color: var(--neon-blue); text-shadow: 0 0 25px rgba(59, 130, 246, 0.4); }
    .g-red { color: var(--neon-red); text-shadow: 0 0 25px rgba(239, 68, 68, 0.4); }
    .g-yellow { color: var(--neon-yellow); text-shadow: 0 0 25px rgba(245, 158, 11, 0.4); }
    .g-green { color: var(--neon-green); text-shadow: 0 0 25px rgba(16, 185, 129, 0.4); }

    /* 2. Glassmorphic Pulse Search Bar */
    #google-search {
      width: 600px;
      max-width: 90vw;
      height: 60px;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #google-search.active-focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 25px rgba(0, 240, 255, 0.25);
    }
    .search-input-mock {
      flex: 1;
      font-size: 1rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .search-input-mock .cursor {
      width: 2px;
      height: 18px;
      background-color: var(--neon-cyan);
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .search-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
    }
    .search-actions .icon-btn {
      cursor: pointer;
      transition: color 0.2s;
    }
    .search-actions .icon-btn:hover {
      color: var(--neon-cyan);
    }

    /* 3. Glassmorphic Buttons */
    .glass-btn {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px 28px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }
    .btn-images:hover { border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 0 15px rgba(59, 130, 246, 0.15); }
    .btn-apps:hover { border-color: rgba(139, 92, 246, 0.4); box-shadow: 0 0 15px rgba(139, 92, 246, 0.15); }
    .btn-settings:hover { border-color: rgba(0, 240, 255, 0.4); box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); }

    /* FLIGHT & PHYSICS CONTROLLER DECK */
    #control-deck {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 50;
      background: rgba(10, 15, 30, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      transform: translate3d(0, 0, 0);
    }
    .deck-title {
      font-family: var(--heading-font);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #64748b;
    }
    .deck-actions {
      display: flex;
      gap: 8px;
    }
    .deck-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
    }
    .deck-btn:hover {
      background: var(--neon-cyan);
      color: #020617;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }
    .deck-btn.active {
      background: var(--neon-purple);
      border-color: var(--neon-purple);
      color: white;
      box-shadow: 0 0 15px rgba(189, 0, 255, 0.4);
    }
    .deck-btn.deck-btn-danger:hover {
      background: var(--neon-red);
      border-color: var(--neon-red);
      color: white;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
    }

    /* INSTRUCTIONAL TIP */
    #tip-banner {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-family: var(--heading-font);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #475569;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      animation: pulse-tip 2s infinite alternate;
    }
    @keyframes pulse-tip {
      0% { opacity: 0.4; }
      100% { opacity: 0.8; }
    }
  </style>
</head>
<body>

  <!-- Background Lights -->
  <div class="spotlight spot-1"></div>
  <div class="spotlight spot-2"></div>

  <!-- CONTROL DECK -->
  <div id="control-deck">
    <div>
      <p class="deck-title">Engine Controller</p>
    </div>
    <div class="deck-actions">
      <button id="btn-gravity" class="deck-btn active">
        <i data-lucide="chevrons-down"></i> Gravity: On
      </button>
      <button id="btn-explosion" class="deck-btn deck-btn-danger">
        <i data-lucide="bomb"></i> Explode
      </button>
      <button id="btn-reset" class="deck-btn">
        <i data-lucide="rotate-ccw"></i> Restore
      </button>
    </div>
  </div>

  <!-- INTERACTIVE ELEMENTS CONTAINER -->
  <div id="ui-container">
    
    <!-- 1. Glowing Logo -->
    <div id="google-logo" class="grav-item" style="top: 25%; left: 50%;">
      <span class="g-blue">G</span>
      <span class="g-red">o</span>
      <span class="g-yellow">o</span>
      <span class="g-blue">g</span>
      <span class="g-green">l</span>
      <span class="g-red">e</span>
    </div>

    <!-- 2. Neon Search Bar -->
    <div id="google-search" class="grav-item" style="top: 42%; left: 50%;">
      <div class="search-input-mock">
        <i data-lucide="search" style="width: 18px; height: 18px; color: #4b5563;"></i>
        <span>Search the future...</span>
        <div class="cursor"></div>
      </div>
      <div class="search-actions">
        <i data-lucide="mic" class="icon-btn" style="width: 18px; height: 18px;" title="AI Voice Search"></i>
        <i data-lucide="aperture" class="icon-btn" style="width: 18px; height: 18px;" title="AI Deep Vision"></i>
      </div>
    </div>

    <!-- 3. Images Quicklink -->
    <div class="grav-item glass-btn btn-images" style="top: 56%; left: 35%;">
      <i data-lucide="image" style="width: 16px; height: 16px;"></i> Images
    </div>

    <!-- 4. Apps Quicklink -->
    <div class="grav-item glass-btn btn-apps" style="top: 56%; left: 50%;">
      <i data-lucide="layout-grid" style="width: 16px; height: 16px;"></i> Suite Apps
    </div>

    <!-- 5. Settings Quicklink -->
    <div class="grav-item glass-btn btn-settings" style="top: 56%; left: 65%;">
      <i data-lucide="sliders" style="width: 16px; height: 16px;"></i> Settings
    </div>

  </div>

  <!-- Physics Collision Boundaries & Drag Canvas -->
  <canvas id="physics-canvas"></canvas>

  <!-- Tip Banner -->
  <div id="tip-banner">
    <i data-lucide="mouse-pointer-click" style="width: 16px; height: 16px;"></i> Click, Drag, and throw elements around
  </div>

  <script>
    // --- PHYSICS & INTERACTIVITY ENGINE ---
    
    // Initialize Lucide icons
    lucide.createIcons();

    // Module aliases
    const { Engine, World, Bodies, Composite, Mouse, MouseConstraint, Events } = Matter;

    // Create physics engine
    const engine = Engine.create({
      gravity: { x: 0, y: 1, scale: 0.001 } // standard falling gravity
    });
    const { world } = engine;

    const canvas = document.getElementById('physics-canvas');
    let width = window.innerWidth;
    let height = window.innerHeight;

    // Set canvas dimensions
    canvas.width = width;
    canvas.height = height;

    // State parameters
    let isGravityActive = true;
    let ground, leftWall, rightWall, topWall;
    const bodyMap = []; // Holds matching references between HTML element and Matter.js body

    // 1. Create Viewport boundaries (walls)
    const wallThickness = 100;
    function buildWalls() {
      if (ground) Composite.remove(world, [ground, leftWall, rightWall, topWall]);

      ground = Bodies.rectangle(width / 2, height + wallThickness / 2, width, wallThickness, { isStatic: true, label: 'wall' });
      leftWall = Bodies.rectangle(-wallThickness / 2, height / 2, wallThickness, height, { isStatic: true, label: 'wall' });
      rightWall = Bodies.rectangle(width + wallThickness / 2, height / 2, wallThickness, height, { isStatic: true, label: 'wall' });
      topWall = Bodies.rectangle(width / 2, -wallThickness / 2, width, wallThickness, { isStatic: true, label: 'wall' });

      Composite.add(world, [ground, leftWall, rightWall, topWall]);
    }
    buildWalls();

    // 2. Initialize HTML elements as physics bodies
    const htmlItems = document.querySelectorAll('.grav-item');
    
    function initializePhysics() {
      // Clear existing bodies from world
      const oldBodies = bodyMap.map(x => x.body);
      Composite.remove(world, oldBodies);
      bodyMap.length = 0;

      htmlItems.forEach((element) => {
        // Reset transformations to measure standard bounds accurately
        element.style.transform = 'none';
        element.style.left = '';
        element.style.top = '';

        // Capture coordinates specified in style tags
        const styleTop = element.style.top || '50%';
        const styleLeft = element.style.left || '50%';
        
        // Convert percentage positions into actual pixels
        const parsedTop = parseFloat(styleTop) / 100 * height;
        const parsedLeft = parseFloat(styleLeft) / 100 * width;

        // Position element absolutely at starting coords
        const w = element.offsetWidth;
        const h = element.offsetHeight;

        element.style.position = 'absolute';
        element.style.left = `${parsedLeft - w / 2}px`;
        element.style.top = `${parsedTop - h / 2}px`;

        // Create rectangular physics body matching element dimensions exactly
        const body = Bodies.rectangle(parsedLeft, parsedTop, w, h, {
          restitution: 0.65, // Bounciness
          friction: 0.1,
          frictionAir: 0.015,
          label: 'item'
        });

        // Add to world and map reference
        Composite.add(world, body);
        bodyMap.push({ element, body, startX: parsedLeft, startY: parsedTop });
      });
    }

    // Measure and initialize once DOM paints
    window.addEventListener('load', () => {
      initializePhysics();
      
      // Animate search focus randomly for glowing neon presentation
      const searchEl = document.getElementById('google-search');
      setInterval(() => {
        searchEl.classList.toggle('active-focus');
      }, 3000);
    });

    // 3. Add Drag & Throw mouse constraint
    const mouse = Mouse.create(canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
      mouse: mouse,
      constraint: {
        stiffness: 0.15,
        render: { visible: false }
      }
    });

    Composite.add(world, mouseConstraint);

    // Keep mouse in sync on scroll/touch
    mouseConstraint.mouse.element.removeEventListener("mousewheel", mouseConstraint.mouse.mousewheel);
    mouseConstraint.mouse.element.removeEventListener("DOMMouseScroll", mouseConstraint.mouse.mousewheel);

    // 4. Synchronization loop: updates DOM positions with Matter.js coordinates
    (function run() {
      Engine.update(engine, 1000 / 60);

      bodyMap.forEach(({ element, body }) => {
        const { x, y } = body.position;
        const angle = body.angle;
        const w = element.offsetWidth;
        const h = element.offsetHeight;

        // Sync visual coordinates & tilt angles
        element.style.left = `${x - w / 2}px`;
        element.style.top = `${y - h / 2}px`;
        element.style.transform = `rotate(${angle}rad)`;
      });

      requestAnimationFrame(run);
    })();

    // 5. Adapt physics boundaries on window resize
    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;

      buildWalls();
    });

    // --- CONTROLLER ACTION LISTENERS ---

    // Toggle Gravity (Standard Falling vs Space floating)
    const btnGravity = document.getElementById('btn-gravity');
    btnGravity.addEventListener('click', () => {
      isGravityActive = !isGravityActive;
      
      if (isGravityActive) {
        engine.gravity.y = 1;
        btnGravity.classList.add('active');
        btnGravity.innerHTML = '<i data-lucide="chevrons-down"></i> Gravity: On';
      } else {
        engine.gravity.y = 0;
        btnGravity.classList.remove('active');
        btnGravity.innerHTML = '<i data-lucide="orbit"></i> Space Float';
      }
      lucide.createIcons();
      toastFeedback(`Gravity switched to ${isGravityActive ? 'Normal' : 'Zero-G'}!`);
    });

    // Shatter/Explode elements outward from viewport center
    const btnExplode = document.getElementById('btn-explosion');
    btnExplode.addEventListener('click', () => {
      bodyMap.forEach(({ body }) => {
        const centerX = width / 2;
        const centerY = height / 2;
        
        // Vector pointing outward from center
        const forceDirectionX = body.position.x - centerX;
        const forceDirectionY = body.position.y - centerY;
        
        // Normalize and scale force
        const distance = Math.max(1, Math.sqrt(forceDirectionX * forceDirectionX + forceDirectionY * forceDirectionY));
        const forceMagnitude = 0.08; 

        Matter.Body.applyForce(body, body.position, {
          x: (forceDirectionX / distance) * forceMagnitude,
          y: (forceDirectionY / distance) * forceMagnitude
        });
      });
      toastFeedback("BOOM! Elements scattered!");
    });

    // Reset items to their starting locations
    const btnReset = document.getElementById('btn-reset');
    btnReset.addEventListener('click', () => {
      bodyMap.forEach(({ body, startX, startY }) => {
        Matter.Body.setPosition(body, { x: startX, y: startY });
        Matter.Body.setVelocity(body, { x: 0, y: 0 });
        Matter.Body.setAngle(body, 0);
        Matter.Body.setAngularVelocity(body, 0);
      });
      toastFeedback("Elements restored to grids.");
    });

    // Simple glassmorphic toast notification feedback
    function toastFeedback(msg) {
      const toast = document.createElement('div');
      toast.style.position = 'absolute';
      toast.style.bottom = '80px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%) translate3d(0, 20px, 0)';
      toast.style.background = 'rgba(15, 23, 42, 0.8)';
      toast.style.border = '1px solid var(--glass-border)';
      toast.style.borderRadius = '12px';
      toast.style.padding = '10px 20px';
      toast.style.fontSize = '0.8rem';
      toast.style.fontWeight = '600';
      toast.style.letterSpacing = '0.05em';
      toast.style.color = 'var(--neon-cyan)';
      toast.style.backdropFilter = 'blur(15px)';
      toast.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
      toast.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
      toast.style.opacity = '0';
      toast.style.zIndex = '100';
      toast.innerText = msg.toUpperCase();

      document.body.appendChild(toast);
      
      // Animate in
      setTimeout(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translate3d(0, 0, 0)';
      }, 50);

      // Animate out
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translate3d(0, -20px, 0)';
        setTimeout(() => toast.remove(), 400);
      }, 2000);
    }
  </script>
</body>
</html>

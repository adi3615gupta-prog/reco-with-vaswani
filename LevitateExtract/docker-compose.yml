# ─── LevitateExtract — Docker Compose ─────────────────────────────────────
# Orchestrates the Form 26AS PDF extraction microservice.
# Run:  docker-compose up --build -d
# ──────────────────────────────────────────────────────────────────────────

services:
  levitate-extract:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: levitate-extract
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    # Resource limits to prevent DoS via memory exhaustion
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

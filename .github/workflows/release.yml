name: Build and Release

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Get current version and bump
      id: version
      run: |
        $version = (Get-Content package.json | ConvertFrom-Json).version
        $parts = $version.Split('.')
        $patch = [int]$parts[2] + 1
        $newVersion = "$($parts[0]).$($parts[1]).$patch"
        Write-Output "new_version=$newVersion" >> $env:GITHUB_OUTPUT
        Write-Output "Current: $version, New: $newVersion"
        
    - name: Update version in package.json
      run: |
        $content = Get-Content package.json -Raw
        $newContent = $content -replace '"version": "[^"]+"', "`"version`": `"${{ steps.version.outputs.new_version }}`""
        $newContent | Set-Content package.json -NoNewline
        
    - name: Commit version update
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add package.json
        git commit -m "Auto-bump version to ${{ steps.version.outputs.new_version }}"
        git push origin main
        
    - name: Create new tag
      run: |
        git tag v${{ steps.version.outputs.new_version }}
        git push origin v${{ steps.version.outputs.new_version }}
      
    - name: Build Electron app
      run: npm run build:exe
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: installer
        path: dist-electron/*.exe
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        files: |
          dist-electron/*.exe
          dist-electron/latest.yml
          dist-electron/*.blockmap
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
